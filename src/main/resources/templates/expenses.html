<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expenses - Expensight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="container-box">
        <div class="d-flex justify-content-between align-items-center">
            <h2>Expense Records</h2>
            <div>
                <a href="/add-expense-page" class="btn btn-primary">Add Expense</a>
                <a href="/" class="btn btn-secondary">Back</a>
            </div>
        </div>

        <div id="alertPlaceholder" class="mt-3"></div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>User</th>
                    <th>Category</th>
                    <th style="width:140px">Actions</th>
                </tr>
            </thead>
            <tbody id="expenseTableBody"></tbody>
        </table>

        <nav id="paginationControls" style="display:none;">
            <ul class="pagination justify-content-center">
                <li class="page-item" id="prevPage"><button class="page-link">Previous</button></li>
                <li class="page-item disabled"><span class="page-link" id="pageInfo">Page 1</span></li>
                <li class="page-item" id="nextPage"><button class="page-link">Next</button></li>
            </ul>
        </nav>
    </div>
</div>

<div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="expenseModalTitle">Edit Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="expenseForm">
                    <input type="hidden" id="expenseId">
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <input type="text" id="expenseDescription" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" id="expenseAmount" class="form-control" step="0.01" min="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" id="expenseDate" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">User ID</label>
                        <input type="number" id="expenseUserId" class="form-control" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category ID</label>
                        <input type="number" id="expenseCategoryId" class="form-control" min="1" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveExpenseBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 0, totalPages = 1;

    function showAlert(message, type) {
        document.getElementById("alertPlaceholder").innerHTML =
            '<div class="alert alert-' + type + ' alert-dismissible fade show">' + message + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
    }

    async function loadExpenses() {
        try {
            const response = await fetch("/api/expenses?page=" + currentPage + "&size=20");
            if (!response.ok) { showAlert("Failed to load expenses.", "danger"); return; }
            const data = await response.json();
            const tbody = document.getElementById("expenseTableBody");
            tbody.innerHTML = "";
            data.content.forEach(function(e) {
                tbody.innerHTML += '<tr><td>' + e.id + '</td><td>' + e.description + '</td><td>&#8377; ' + e.amount +
                    '</td><td>' + e.date + '</td><td>' + (e.user ? e.user.name : 'N/A') + '</td><td>' + (e.category ? e.category.name : 'N/A') +
                    '</td><td><button class="btn btn-sm btn-warning me-2" onclick="editExpense(' + e.id + ')">Edit</button>' +
                    '<button class="btn btn-sm btn-danger" onclick="deleteExpense(' + e.id + ')">Delete</button></td></tr>';
            });
            totalPages = data.totalPages;
            updatePagination();
        } catch (e) { showAlert("Unable to connect to server.", "danger"); }
    }

    function updatePagination() {
        var nav = document.getElementById("paginationControls");
        if (totalPages <= 1) { nav.style.display = "none"; return; }
        nav.style.display = "block";
        document.getElementById("pageInfo").textContent = "Page " + (currentPage + 1) + " of " + totalPages;
        document.getElementById("prevPage").className = "page-item" + (currentPage === 0 ? " disabled" : "");
        document.getElementById("nextPage").className = "page-item" + (currentPage >= totalPages - 1 ? " disabled" : "");
    }

    document.getElementById("prevPage").addEventListener("click", function() { if (currentPage > 0) { currentPage--; loadExpenses(); } });
    document.getElementById("nextPage").addEventListener("click", function() { if (currentPage < totalPages - 1) { currentPage++; loadExpenses(); } });

    function editExpense(id) {
        fetch("/api/expenses/" + id).then(function(r) { return r.json(); }).then(function(e) {
            document.getElementById("expenseModalTitle").textContent = "Edit Expense";
            document.getElementById("expenseId").value = e.id;
            document.getElementById("expenseDescription").value = e.description;
            document.getElementById("expenseAmount").value = e.amount;
            document.getElementById("expenseDate").value = e.date;
            document.getElementById("expenseUserId").value = e.user ? e.user.id : "";
            document.getElementById("expenseCategoryId").value = e.category ? e.category.id : "";
            new bootstrap.Modal(document.getElementById("expenseModal")).show();
        });
    }

    document.getElementById("saveExpenseBtn").addEventListener("click", async function() {
        var id = document.getElementById("expenseId").value;
        var desc = document.getElementById("expenseDescription").value.trim();
        var amount = document.getElementById("expenseAmount").value;
        var date = document.getElementById("expenseDate").value;
        var userId = document.getElementById("expenseUserId").value;
        var categoryId = document.getElementById("expenseCategoryId").value;
        if (!desc || !amount || !date || !userId || !categoryId) { showAlert("All fields are required.", "warning"); return; }

        var body = { description: desc, amount: parseFloat(amount), date: date, userId: parseInt(userId), categoryId: parseInt(categoryId) };
        var url = "/api/expenses/" + id;
        try {
            var response = await fetch(url, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById("expenseModal")).hide();
                showAlert("Expense updated successfully.", "success");
                loadExpenses();
            } else {
                var err = await response.json();
                showAlert(err.message || "Update failed.", "danger");
            }
        } catch (e) { showAlert("Unable to connect to server.", "danger"); }
    });

    function deleteExpense(id) {
        if (!confirm("Are you sure you want to delete expense " + id + "?")) return;
        fetch("/api/expenses/" + id, { method: "DELETE" }).then(function(r) {
            if (r.ok) { showAlert("Expense deleted successfully.", "success"); loadExpenses(); }
            else { r.json().then(function(err) { showAlert(err.message || "Delete failed.", "danger"); }); }
        }).catch(function() { showAlert("Unable to connect to server.", "danger"); });
    }

    loadExpenses();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
