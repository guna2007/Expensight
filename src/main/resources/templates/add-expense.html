<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense - Expensight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <div class="container-box">

        <div class="d-flex justify-content-between align-items-center">
            <h2>Add Expense</h2>
            <a href="/" class="btn btn-secondary">Back</a>
        </div>

        <div id="alertPlaceholder" class="mt-3"></div>

        <form id="expenseForm" class="mt-4">

            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" id="description" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" id="amount" class="form-control" step="0.01" min="0.01" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" id="date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">User ID</label>
                <input type="number" id="userId" class="form-control" min="1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category ID</label>
                <input type="number" id="categoryId" class="form-control" min="1" required>
            </div>

            <button type="submit" class="btn btn-primary">Add Expense</button>

        </form>

    </div>

</div>

<script>
    function showAlert(message, type) {
        const placeholder = document.getElementById("alertPlaceholder");
        placeholder.innerHTML = '<div class="alert alert-' + type + ' alert-dismissible fade show" role="alert">'
            + message
            + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
    }

    document.getElementById("expenseForm")
        .addEventListener("submit", async function (event) {

            event.preventDefault();

            const expenseData = {
                description: document.getElementById("description").value,
                amount: parseFloat(document.getElementById("amount").value),
                date: document.getElementById("date").value,
                userId: parseInt(document.getElementById("userId").value),
                categoryId: parseInt(document.getElementById("categoryId").value)
            };

            try {
                const response = await fetch("/api/expenses", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(expenseData)
                });

                if (response.ok) {
                    showAlert("Expense added successfully!", "success");
                    document.getElementById("expenseForm").reset();
                } else {
                    const error = await response.json();
                    showAlert(error.message || "Failed to add expense. Please check your input.", "danger");
                }
            } catch (error) {
                showAlert("Unable to connect to the server. Please try again later.", "danger");
            }
        });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
