<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expensight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">Expensight</h1>
        <p class="text-muted">Track, manage, and analyze your expenses with ease.</p>
    </div>

    <div class="row g-4 mb-5" id="summaryCards">
        <div class="col-md-3">
            <div class="card dashboard-card text-center border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title text-primary">Total Users</h5>
                    <p class="display-6 fw-bold text-primary mb-0" id="totalUsers">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card dashboard-card text-center border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title text-success">Total Categories</h5>
                    <p class="display-6 fw-bold text-success mb-0" id="totalCategories">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card dashboard-card text-center border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title text-danger">Total Expenses</h5>
                    <p class="display-6 fw-bold text-danger mb-0" id="totalExpenses">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card dashboard-card text-center border-0 shadow-sm">
                <div class="card-body py-4">
                    <h5 class="card-title text-warning">Total Amount</h5>
                    <p class="display-6 fw-bold text-warning mb-0" id="totalAmount">-</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-4">
            <a href="/users-page" class="text-decoration-none">
                <div class="card dashboard-card h-100 text-center border-0 shadow-sm">
                    <div class="card-body py-5">
                        <h3 class="card-title fw-bold text-primary">Users</h3>
                        <p class="card-text text-muted">Manage user profiles and accounts</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/categories-page" class="text-decoration-none">
                <div class="card dashboard-card h-100 text-center border-0 shadow-sm">
                    <div class="card-body py-5">
                        <h3 class="card-title fw-bold text-success">Categories</h3>
                        <p class="card-text text-muted">Organize expenses by category</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/expenses-page" class="text-decoration-none">
                <div class="card dashboard-card h-100 text-center border-0 shadow-sm">
                    <div class="card-body py-5">
                        <h3 class="card-title fw-bold text-danger">Expenses</h3>
                        <p class="card-text text-muted">View and manage all expense records</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="text-center mt-5">
        <a href="/add-expense-page" class="btn btn-primary btn-lg px-5">Add New Expense</a>
    </div>
</div>

<script>
    async function loadSummary() {
        try {
            const response = await fetch("/api/dashboard/summary");
            if (response.ok) {
                const data = await response.json();
                document.getElementById("totalUsers").textContent = data.totalUsers;
                document.getElementById("totalCategories").textContent = data.totalCategories;
                document.getElementById("totalExpenses").textContent = data.totalExpenses;
                document.getElementById("totalAmount").textContent = "\u20B9 " + Number(data.totalAmount).toLocaleString("en-IN", {minimumFractionDigits: 2});
            }
        } catch (e) {
            console.error("Error loading summary:", e);
        }
    }
    loadSummary();
</script>

</body>
</html>
